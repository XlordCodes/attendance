<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Authentication</title>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js';
        import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBc-O_9NLyBEyBd92lEeTmM7apb5N7VbXc",
            authDomain: "aintrix-attendance.firebaseapp.com",
            projectId: "aintrix-attendance",
            storageBucket: "aintrix-attendance.firebasestorage.app",
            messagingSenderId: "964724840136",
            appId: "1:964724840136:web:a75cbea81e8a0852d277fd",
            measurementId: "G-HP5J9X1ZT9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        async function testAuth() {
            console.log('🧪 Testing authentication...');
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, 'employee1@test.com', 'password123');
                const user = userCredential.user;
                console.log('✅ Firebase Auth successful:', user.uid, user.email);

                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    console.log('✅ Firestore user found:', userDoc.data());
                } else {
                    console.log('❌ Firestore user NOT found for UID:', user.uid);
                }
            } catch (error) {
                console.error('❌ Auth error:', error);
            }
        }

        window.testAuth = testAuth;
        console.log('🔬 Debug script loaded. Run testAuth() in console.');
    </script>
</head>
<body>
    <h1>Debug Authentication</h1>
    <p>Open browser console and run: <code>testAuth()</code></p>
    <button onclick="testAuth()">Test Authentication</button>
</body>
</html>
